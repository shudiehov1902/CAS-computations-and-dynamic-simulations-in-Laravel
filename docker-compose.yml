services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://127.0.0.1:8000
      DB_CONNECTION: mariadb
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: webte2
      DB_USERNAME: webte2
      DB_PASSWORD: webte2
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      CAS_API_KEY: change_me_secret_key
      OCTAVE_PATH: octave
      OCTAVE_TIMEOUT_SECONDS: 10
      SIMULATION_DELAY_MS: 50
      STATISTICS_INTERVAL_MINUTES: 10
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mariadb:11.4
    ports:
      - "3307:3306"
    environment:
      MARIADB_DATABASE: webte2
      MARIADB_USER: webte2
      MARIADB_PASSWORD: webte2
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-proot", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  mariadb_data:
